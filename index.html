<!DOCTYPE html>
<html>
<head>
  <title>Tuhin Noct</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300&display=swap');

    body {
      margin: 0;
      background: linear-gradient(to bottom, #0b1220, #020617);
      color: #e5e7eb;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 48px;
      color: #facc15;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 10px;
      font-size: 16px;
    }

    .line {
      width: 60px;
      height: 2px;
      background: #facc15;
      margin: 20px auto;
      opacity: 0.6;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      border: 1px solid #facc15;
      color: #facc15;
      text-decoration: none;
      border-radius: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #facc15;
      color: black;
    }

    footer {
      margin-top: 80px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Tuhin Noct</h1>
    <div class="line"></div>
    <p class="subtitle">A traveler exploring code and creativity</p>

    <div class="buttons">
      <a class="btn" href="#">About</a>
      <a class="btn" href="#">Projects</a>
      <a class="btn" href="#">Contact</a>
    </div>
  </div>

  <footer>
    © 2026 Tuhin Noct
  </footer>

</body>
</html>
