<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameKlub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #e5e5e5;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* Header */
.header {
  position: absolute;
  top: 20px;
  left: 30px;
  font-size: 18px;
  letter-spacing: 2px;
}

/* Center */
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 60px;
}

.game {
  text-align: center;
  cursor: pointer;
}

.box {
  width: 120px;
  height: 120px;
  border: 2px solid #888;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.box:hover {
  border-color: white;
  transform: scale(1.05);
}

.game p {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}

/* Socials */
.socials {
  position: absolute;
  bottom: 20px;
  left: 30px;
}

.socials a {
  color: #aaa;
  text-decoration: none;
  font-size: 14px;
}

.socials a:hover {
  color: white;
}

/* Signature */
.signature {
  position: absolute;
  bottom: 20px;
  right: 30px;
  font-size: 12px;
  color: #555;
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

canvas {
  background: #000;
  border: 2px solid #888;
}

/* UI */
.ui {
  color: white;
  margin: 10px;
}

/* D-pad */
.dpad {
  position: fixed;
  bottom: 40px;
  right: 40px;
  display: none;
  opacity: 0.6;
}

.dpad button {
  width: 50px;
  height: 50px;
  margin: 5px;
  font-size: 18px;
  background: #222;
  color: white;
  border: none;
}

@media (max-width: 768px) {
  .dpad {
    display: block;
  }
}
</style>
</head>

<body>

<div class="header">GameKlub</div>

<div class="center">
  <div class="game" onclick="openGame()">
    <div class="box">+</div>
    <p>Snake</p>
  </div>
</div>

<div class="socials">
  <a href="https://instagram.com/tuhin0827d" target="_blank">@tuhin0827d</a>
</div>

<div class="signature">TUHIN MAJI</div>

<!-- GAME POPUP -->
<div class="popup" id="gamePopup">
  <div class="ui">
    Score: <span id="score">0</span>
    <button onclick="restart()">Restart</button>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="ui" id="gameOver" style="display:none;">Game Over</div>
</div>

<!-- DPAD -->
<div class="dpad">
  <div style="text-align:center;">
    <button onclick="setDir(0,-1)">↑</button>
  </div>
  <div>
    <button onclick="setDir(-1,0)">←</button>
    <button onclick="setDir(1,0)">→</button>
  </div>
  <div style="text-align:center;">
    <button onclick="setDir(0,1)">↓</button>
  </div>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, dir, food, score, gameInterval, running;

function openGame() {
  document.getElementById("gamePopup").style.display = "flex";
  startGame();
}

function startGame() {
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = {x:15,y:15};
  score = 0;
  running = true;
  document.getElementById("score").innerText = score;
  document.getElementById("gameOver").style.display = "none";
  clearInterval(gameInterval);
  gameInterval = setInterval(update, 120);
}

function update() {
  if (!running) return;

  let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x<0||head.y<0||head.x>=20||head.y>=20||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    running = false;
    document.getElementById("gameOver").style.display = "block";
    return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById("score").innerText = score;
    food = {x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0,0,400,400);

  // snake glow
  ctx.fillStyle = "white";
  snake.forEach(s=>{
    ctx.shadowBlur = 10;
    ctx.shadowColor = "white";
    ctx.fillRect(s.x*20, s.y*20, 18, 18);
  });

  // star food
  ctx.shadowBlur = 0;
  ctx.fillText("✦", food.x*20+5, food.y*20+15);
}

function setDir(x,y) {
  dir = {x,y};
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp"||e.key==="w") setDir(0,-1);
  if(e.key==="ArrowDown"||e.key==="s") setDir(0,1);
  if(e.key==="ArrowLeft"||e.key==="a") setDir(-1,0);
  if(e.key==="ArrowRight"||e.key==="d") setDir(1,0);
  if(e.key==="p") running = !running;
});

function restart() {
  startGame();
}
</script>

</body>
</html>
